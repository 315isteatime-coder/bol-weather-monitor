<script type="module">
const SB_URL  = "https://pofaxxvjcdugqimummsr.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvZmF4eHZqY2R1Z3FpbXVtbXNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzMzNTQsImV4cCI6MjA5NzMwOTM1NH0.EGgZmbFeNdQSasGjy9tsRnDgVFYYZhQ9xwEnn-xners";
const TABLE   = "cards";
const CATS = [
  {k:"game",     emoji:"рҹҺ®", label:"йҒҠжҲІ",     max:4, inc:1},
  {k:"workshop", emoji:"рҹӣ ", label:"е·ҘдҪңеқҠ",   max:1, inc:1},
  {k:"checkin",  emoji:"рҹ“ё", label:"жү“еҚЎ",     max:2, inc:1},
  {k:"market",   emoji:"рҹ§ҫ", label:"е ҙе…§ж¶ҲиІ»", max:3, inc:1},
  {k:"partner",  emoji:"рҹҸӘ", label:"еҗҲдҪңе•ҶжҲ¶", max:1, inc:1},
];
const TOTAL_MAX = CATS.reduce((s,c)=>s+c.max,0);
const TIERS = [2,4,8,10,11];
const TIER_LABEL = {2:"з«Ӣжёӣе„Әжғ еҲё 1 ејө",4:"йҷҗе®ҡе°ҸзҰ®зү© 1 д»Ҫ",8:"йҷҗе®ҡдёӯзҰ®зү© 1 д»Ҫ",10:"йҷҗе®ҡе·ҘдҪңеқҠй«”й©— 1 ж¬Ў",11:"йҷҗе®ҡеӨ§зҰ®зү© 1 д»Ҫ"};

// в”Җв”Җ жҜҸеёіиҷҹ В· жҜҸеҲҶйЎһ В· жҜҸеҚЎ и“Ӣз« дёҠйҷҗ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// key = зҷ»е…Ҙ emailпјҲзҙ°йҡҺпјүгҖӮvalue = {еҲҶйЎһ:жҜҸеҚЎдёҠйҷҗ, redeem:еҸҜе””еҸҜж ёж¶Ҳ}гҖӮ
// еҗҢдёҖеҲҶйЎһеҸҜжӢҶз•Җе№ҫеҖӢеёіиҷҹпјҲйҒҠжҲІ = й–ҖеҸЈ1 + е…§е ҙA2 + е…§е ҙB2пјүпјҢ
// дҪҶжҜҸеҚЎи©ІеҲҶйЎһзёҪж•ёд»ҚеҸ— CATS.max е°Ғй ӮпјҲйҒҠжҲІе°Ғ 4пјүгҖӮ
const STAFF_LIMITS = {
  "door@bolmacau.com":     {game:1},      // рҹҺ® йҒҠжҲІВ·й–ҖеҸЈ
  "game-a@bolmacau.com":   {game:2},      // рҹҺ® йҒҠжҲІВ·е…§е ҙA
  "game-b@bolmacau.com":   {game:2},      // рҹҺ® йҒҠжҲІВ·е…§е ҙB
  "workshop@bolmacau.com": {workshop:1},  // рҹӣ  е·ҘдҪңеқҠ
  "center@bolmacau.com":   {game:4, workshop:1, checkin:2, market:3, partner:1, redeem:true}, // рҹҸӣ еӨ§жңғдёӯеҝғпјҡе…Ё 5 йЎһ + ж ёж¶Ҳ
};

const $ = s => document.querySelector(s);
const app = $("#app");
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const total = st => CATS.reduce((s,c)=>s+(st[c.k]||0),0);
let sb=null, cur=null, staffEmail=null;   // cur = жҹҘз·Ҡе—°ејөеҚЎпјӣstaffEmail = зҷ»е…Ҙеёіиҷҹ emailпјҲзҙ°йҡҺпјү
function myLimits(){ return STAFF_LIMITS[(staffEmail||"").toLowerCase()] || {}; }
function canRedeem(){ return !!myLimits().redeem; }
function myCatCount(slog, k){ const m = slog && slog[k]; return (m && typeof m==="object" && !Array.isArray(m)) ? (m[staffEmail]||0) : 0; }

async function getSb(){
  if(sb) return sb;
  const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
  sb = createClient(SB_URL, SB_ANON);   // default persistSessionпјҡstaff зҷ»е…ҘиЁҳдҪҸ
  return sb;
}
function normCode(s){ s=(s||"").trim().toUpperCase().replace(/\s+/g,""); if(s && !s.startsWith("IEC-")) s = s.replace(/^IEC/,"") ? ("IEC-"+s.replace(/^IEC-?/,"")) : ("IEC-"+s); return s; }

async function boot(){
  const c = await getSb();
  const { data:{ session } } = await c.auth.getSession();
  if(!session) return renderLogin();
  staffEmail = (session.user.email||"").toLowerCase();
  renderLookup();
}
function renderLogin(){
  app.innerHTML='<input id="em" type="email" placeholder="е·ҘдҪңдәәе“Ў email" autocomplete="username">'+
    '<input id="pw" type="password" placeholder="еҜҶзўј" autocomplete="current-password">'+
    '<button class="btn" id="login" style="width:100%">зҷ»е…Ҙ</button><div class="status" id="ls"></div>'+
    '<div class="lock">рҹ”’ з”ЁеӨ§жңғй…Қзҷјеҳ…е·ҘдҪңдәәе“Ўеёіиҷҹзҷ»е…ҘгҖӮзҷ»е…ҘдёҖж¬ЎжңғиЁҳдҪҸгҖӮ</div>';
  $("#login").onclick = async ()=>{
    $("#ls").textContent="зҷ»е…Ҙз·ҠвҖҰ"; $("#ls").className="status";
    const c = await getSb();
    const { error } = await c.auth.signInWithPassword({ email:$("#em").value.trim(), password:$("#pw").value });
    if(error){ $("#ls").textContent="зҷ»е…ҘеӨұж•—пјҡ"+error.message; $("#ls").className="status err"; }
    else boot();
  };
}
function renderLookup(msg, cls){
  cur=null;
  app.innerHTML='<div class="bar"><input class="codein" id="code" placeholder="IEC-XXXXX" autocapitalize="characters" autocomplete="off" style="margin-bottom:0">'+
    '<button class="btn go" id="find">жҹҘеҚЎ</button><button class="btn" id="scan" style="background:var(--purple);border-color:var(--purple)">рҹ“· жҺғ QR</button><button class="btn alt" id="lo">зҷ»еҮә</button></div>'+
    '<div class="status '+(cls||'')+'" id="st">'+(msg||'')+'</div>';
  const go = async ()=>{
    const code = normCode($("#code").value);
    if(!code || code.length<5){ $("#st").textContent="и«Ӣијёе…ҘеҚЎиҷҹ"; $("#st").className="status err"; return; }
    $("#st").textContent="жҗөз·ҠвҖҰ"; $("#st").className="status";
    const c = await getSb();
    const { data, error } = await c.from(TABLE).select("*").eq("code", code).maybeSingle();
    if(error){ $("#st").textContent="и®ҖеҸ–еӨұж•—пјҡ"+error.message; $("#st").className="status err"; return; }
    if(!data){ $("#st").textContent="жҗөе””еҲ°гҖҢ"+code+"гҖҚпјҢи«Ӣж ёе°ҚеҚЎиҷҹгҖӮ"; $("#st").className="status err"; return; }
    cur = data; renderCard();
  };
  $("#find").onclick = go;
  $("#scan").onclick = ()=>openScanner(go);
  $("#code").addEventListener("keydown", e=>{ if(e.key==="Enter") go(); });
  $("#lo").onclick = logout;
  const pre = new URLSearchParams(location.search).get("code");
  if(pre){ $("#code").value = normCode(pre); history.replaceState(null,"",location.pathname); go(); }
}

// QR е…§е®№еҸҜиғҪдҝӮж·ұйҖЈзөҗпјҲcard-staff.html?code=IEC-XXXXXпјүжҲ–ж·ЁдҝӮеҚЎиҷҹ вҶ’ жҠҪиҝ”еҚЎиҷҹ
function extractCode(text){
  if(!text) return "";
  try{ const u = new URL(text); const c = u.searchParams.get("code"); if(c) return normCode(c); }catch(e){}
  return normCode(text);
}
async function openScanner(go){
  const ov = document.createElement("div"); ov.className="scanov";
  ov.innerHTML =
    '<div class="scanhd">рҹ“· е°Қжә–еҸғеҠ иҖ…йӣ»еӯҗеҚЎдёҠеҳ… QR code</div>'+
    '<div id="reader"></div>'+
    '<div class="scanerr" id="scanerr"></div>'+
    '<button class="btn alt" id="scanclose" style="margin-top:14px">еҸ–ж¶Ҳ</button>';
  document.body.appendChild(ov);
  let scanner=null, done=false;
  const cleanup = async ()=>{ if(done) return; done=true; try{ if(scanner){ await scanner.stop(); scanner.clear(); } }catch(e){} ov.remove(); };
  ov.querySelector("#scanclose").onclick = cleanup;
  try{
    const mod = await import("https://esm.sh/html5-qrcode@2.3.8");
    const Html5Qrcode = mod.Html5Qrcode || (mod.default && mod.default.Html5Qrcode) || mod.default;
    if(done) return;
    scanner = new Html5Qrcode("reader", { verbose:false });
    await scanner.start({ facingMode:"environment" }, { fps:10, qrbox:{ width:230, height:230 } },
      async (decoded)=>{
        const code = extractCode(decoded);
        if(!code || code.length<5) return;
        await cleanup();
        const inp = $("#code"); if(inp) inp.value = code;
        if(go) go();
      },
      ()=>{} );
  }catch(e){
    const er = ov.querySelector("#scanerr");
    if(er) er.textContent = "й–Ӣе””еҲ°зӣёж©ҹпјҡ"+((e&&e.message)||e)+"гҖӮеҸҜж”№з”ЁжүӢеӢ•ијёе…ҘеҚЎиҷҹ / з”ЁжүӢж©ҹзӣёж©ҹзӣҙжҺҘжҺғ QRгҖӮ";
  }
}

function renderCard(){
  const st = cur.stamps||{}, redeemed = Array.isArray(cur.redeemed)?cur.redeemed:[];
  const tot = total(st);
  const slog = cur.stamp_log||{};
  const lim = myLimits();
  const myCats = CATS.filter(cat => (lim[cat.k]||0) > 0);
  const roleDesc = myCats.length ? myCats.map(c=>c.emoji+c.label+' '+lim[c.k]).join('гҖҖ') : 'еҶҮи“Ӣз« ж¬Ҡйҷҗ';

  let buttons;
  if(!myCats.length){
    buttons = '<div class="lock" style="grid-column:1/-1">вҡ пёҸ е‘ўеҖӢеёіиҷҹжңӘй…ҚзҪ®и“Ӣз« ж¬ҠйҷҗпјҢж·ЁдҝӮзқҮеҫ—еҚЎгҖӮиҰҒи“Ӣз« и«Ӣж”№з”Ёе°ҚжҮүеҲҶйЎһеҳ…е·ҘдҪңдәәе“Ўеёіиҷҹзҷ»е…ҘгҖӮ</div>';
  } else {
    buttons = myCats.map(cat=>{
      const n = Math.min(st[cat.k]||0, cat.max);   // е‘ўејөеҚЎи©ІеҲҶйЎһзёҪж•ё
      const mine = myCatCount(slog, cat.k);        // дҪ еёіиҷҹе–әе‘ўејөеҚЎи“Ӣе’—е№ҫеӨҡ
      const cap = lim[cat.k];                      // дҪ еёіиҷҹдёҠйҷҗ
      const full = mine>=cap || n>=cat.max || tot>=TOTAL_MAX;
      const lbl = mine>=cap ? 'вң“ дҪ еёіиҷҹи“ӢеӨ '
                : n>=cat.max ? 'вң“ жӯӨеҲҶйЎһе·Іж»ҝ'
                : ('+'+cat.inc+' '+cat.emoji+' '+cat.label);
      return '<button class="sbtn" data-cat="'+cat.k+'"'+(full?' disabled':'')+'>'+lbl+
        '<span class="n">еҚЎ '+n+'/'+cat.max+'гҖҖВ·гҖҖдҪ  '+mine+'/'+cap+'</span></button>';
    }).join('');
  }

  let rewardsHtml;
  if(canRedeem()){
    const rewards = TIERS.map(t=>{
      if(redeemed.includes(t)) return '<div class="rwdone"><span class="rn">'+t+'</span><span class="rd">'+esc(TIER_LABEL[t])+'</span><span>е·Іж ёж¶Ҳ вң”пёҺ</span></div>';
      if(tot>=t) return '<button class="rwbtn" data-tier="'+t+'"><span class="rn">'+t+'</span><span class="rd">'+esc(TIER_LABEL[t])+'</span><span class="ra">ж ёж¶Ҳ вҶ’</span></button>';
      return '<div class="rwlock">рҹ”’ '+t+' з«  вҖ” '+esc(TIER_LABEL[t])+'пјҲд»ІзҲӯ '+(t-tot)+' з« пјү</div>';
    }).join('');
    rewardsHtml = '<div class="sech">ж ёж¶ҲзҚҺиіһпјҲеӨ з« е…ҲеҮәпјҢж ёж¶ҲеҫҢе””еҸҜйҮҚиӨҮпјү</div>'+rewards;
  } else {
    rewardsHtml = '<div class="sech">ж ёж¶ҲзҚҺиіһ</div><div class="lock">рҹҺҒ ж ёж¶Ҳе–әжңҚеӢҷиҷ•пјҲA29вҖ“A30пјүз”ұиІ иІ¬еёіиҷҹиҷ•зҗҶпјӣдҪ е‘ўеҖӢеёіиҷҹж·ЁдҝӮи“Ӣз« пјҢе””еҮәж ёж¶ҲжҺЈгҖӮ</div>';
  }

  app.innerHTML =
    '<div class="cardhd"><span class="cc">'+esc(cur.code)+'</span><span class="ct">е…ұ <b>'+tot+'</b> / '+TOTAL_MAX+' з« </span></div>'+
    '<div class="lock" style="margin:3px 0 0">рҹ‘Ө '+esc(staffEmail||"?")+'гҖҖ|гҖҖдҪ еҸҜи“Ӣпјҡ'+esc(roleDesc)+'</div>'+
    '<div class="status okc" id="st"></div>'+
    '<div class="sech">и“Ӣз« пјҲж·ЁдҝӮеҮәдҪ иІ иІ¬еҳ…еҲҶйЎһпјӣеӨ ж•ёиҮӘеӢ•йҺ–пјү</div><div class="stampgrid">'+buttons+'</div>'+
    rewardsHtml+
    '<div class="bar" style="margin-top:18px"><button class="btn alt" id="another">жҹҘеҸҰдёҖејөеҚЎ</button><button class="btn alt" id="lo">зҷ»еҮә</button></div>';
  app.querySelectorAll(".sbtn").forEach(b=> b.onclick = ()=>doStamp(b));
  app.querySelectorAll(".rwbtn").forEach(b=> b.onclick = ()=>doRedeem(b));
  $("#another").onclick = ()=>renderLookup();
  $("#lo").onclick = logout;
}

async function doStamp(btn){
  const catKey = btn.dataset.cat; const cat = CATS.find(c=>c.k===catKey);
  const cap = myLimits()[catKey]||0;
  if(!cap){ setSt("дҪ еёіиҷҹе””иІ иІ¬гҖҢ"+(cat?cat.label:catKey)+"гҖҚ","err"); return; }
  btn.disabled=true;
  const c = await getSb();
  if(!staffEmail){ const {data:{session}}=await c.auth.getSession(); if(session) staffEmail=(session.user.email||"").toLowerCase(); else { setSt("и«ӢйҮҚж–°зҷ»е…Ҙ","err"); return renderLogin(); } }
  // дёҰзҷје®үе…Ёпјҡre-fetch жңҖж–° вҶ’ clamp вҶ’ еҜ«иҝ”
  const { data:fresh, error:e1 } = await c.from(TABLE).select("stamps,stamp_log").eq("code",cur.code).single();
  if(e1){ setSt("и®ҖеҸ–еӨұж•—пјҡ"+e1.message,"err"); btn.disabled=false; return; }
  const stamps = Object.assign({}, fresh.stamps||{});
  const slog   = Object.assign({}, fresh.stamp_log||{});
  const prev = slog[catKey];
  const catlog = Object.assign({}, (prev && typeof prev==="object" && !Array.isArray(prev)) ? prev : {});
  const mine = catlog[staffEmail]||0;
  if(mine>=cap){ setSt("вҡ пёҸ дҪ еёіиҷҹе–әе‘ўејөеҚЎе·Іи“ӢеӨ гҖҢ"+cat.label+"гҖҚпјҲ"+mine+"/"+cap+"пјү","err"); cur.stamps=stamps; cur.stamp_log=slog; renderCard(); return; }
  const next = Math.min((stamps[catKey]||0)+cat.inc, cat.max);
  if(next===(stamps[catKey]||0)){ setSt("гҖҢ"+cat.label+"гҖҚе‘ўејөеҚЎе·ІйҒ”дёҠйҷҗ "+cat.max,"err"); cur.stamps=stamps; cur.stamp_log=slog; renderCard(); return; }
  stamps[catKey]=next; catlog[staffEmail]=mine+1; slog[catKey]=catlog;
  const { data, error:e2 } = await c.from(TABLE).update({stamps, stamp_log:slog}).eq("code",cur.code).select().single();
  if(e2){ setSt("еҜ«е…ҘеӨұж•—пјҡ"+e2.message,"err"); btn.disabled=false; return; }
  cur = data; renderCard(); setSt("вң“ е·Іи“ӢгҖҢ"+cat.label+"гҖҚ+"+cat.inc,"okc");
}
async function doRedeem(btn){
  if(!canRedeem()){ setSt("дҪ еёіиҷҹе””иІ иІ¬ж ёж¶ҲпјҲеҺ»жңҚеӢҷиҷ• A29вҖ“A30пјү","err"); return; }
  const tier = +btn.dataset.tier;
  btn.disabled=true;
  const c = await getSb();
  const { data:fresh, error:e1 } = await c.from(TABLE).select("redeemed").eq("code",cur.code).single();
  if(e1){ setSt("еҜ«е…ҘеӨұж•—пјҡ"+e1.message,"err"); btn.disabled=false; return; }
  const redeemed = Array.isArray(fresh.redeemed)?fresh.redeemed.slice():[];
  if(redeemed.includes(tier)){ setSt("е‘ўеҖӢзҚҺе·Іж ёж¶ҲйҒҺ","err"); cur.redeemed=redeemed; renderCard(); return; }
  redeemed.push(tier);
  const { data, error:e2 } = await c.from(TABLE).update({redeemed}).eq("code",cur.code).select().single();
  if(e2){ setSt("еҜ«е…ҘеӨұж•—пјҡ"+e2.message,"err"); btn.disabled=false; return; }
  cur = data; renderCard(); setSt("вң“ е·Іж ёж¶Ҳпјҡ"+TIER_LABEL[tier],"okc");
}
function setSt(t,cls){ const s=$("#st"); if(s){ s.textContent=t; s.className="status "+(cls||""); } }
async function logout(){ const c=await getSb(); await c.auth.signOut(); renderLogin(); }

boot();
</script>
