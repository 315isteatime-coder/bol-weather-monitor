<!doctype html>
<html lang="zh-Hant-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ec1c24">
<title>我的電子集點卡 · 世界盃系列（益隆）</title>
<meta property="og:title" content="我的電子集點卡 · 世界盃系列（益隆）">
<meta property="og:description" content="片區戶外生活節 2026 — 儲印章換禮物">
<meta property="og:image" content="https://ieclong.com/assets/kv-portrait.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fffdf6; --ink:#1d1b1a; --mut:#76706a; --line:#ece1cd;
    --red:#ec1c24; --cyan:#00a6e0; --teal:#14a08f; --green:#1fa971;
    --yellow:#ffc20e; --orange:#f5821f; --purple:#7a57a5; --magenta:#e6007e;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{ background:var(--bg); color:var(--ink);
    font-family:"Baloo 2",-apple-system,BlinkMacSystemFont,"Noto Sans HK","PingFang HK","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    max-width:560px; margin:0 auto; padding:0 0 calc(40px + env(safe-area-inset-bottom)); overflow-x:hidden; }
  .wrap{padding:0 15px}
  .nav{display:flex; gap:6px; margin:14px 0 2px}
  .nav a{flex:1; text-align:center; font-family:"Baloo 2",sans-serif; font-weight:800; font-size:12px; text-decoration:none; padding:10px 3px; border-radius:999px; border:2.5px solid var(--ink); color:var(--ink); background:#fff; white-space:nowrap}
  .nav a.active{background:var(--ink); color:#fff}
  .nav a:active{transform:scale(.98)}
  .kvbanner{width:100%; height:auto; display:block}
  header h1{font-size:25px; font-weight:800; margin:12px 0 4px; letter-spacing:.01em}
  header .sub{font-size:12.5px; color:var(--mut); font-weight:600}
  .dots{height:14px; margin:13px 0 2px; background-image:radial-gradient(var(--red) 2px, transparent 2.4px); background-size:11px 11px; opacity:.5}

  .codecard{margin-top:14px; border:3px solid var(--ink); border-radius:18px; background:#fff; box-shadow:0 6px 0 rgba(0,0,0,.05); overflow:hidden}
  .codecard .ch{background:var(--purple); color:#fff; padding:10px 16px; font-size:13px; font-weight:800; text-align:center; letter-spacing:.02em}
  .codecard .cb{padding:14px 16px 16px; text-align:center}
  .cardcode{font-family:"Baloo 2"; font-size:34px; font-weight:800; letter-spacing:.10em; color:var(--ink); background:var(--bg); border:3px dashed var(--red); border-radius:14px; padding:14px 8px; margin:2px 0 8px}
  .codehint{font-size:12.5px; color:var(--mut); font-weight:600; line-height:1.5}
  .qr{display:block; width:190px; height:190px; margin:4px auto 10px; background:#fff; border-radius:12px; border:2.5px solid var(--ink); padding:7px}

  .totalbar{display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; font-weight:800}
  .totalbar .tn{font-size:30px; color:var(--purple); line-height:1}
  .totalbar .tt{font-size:13px; color:var(--mut)}

  .sec2{font-size:18px; font-weight:800; margin:20px 0 2px}
  .catcard{border:2.5px solid var(--line); border-radius:16px; background:#fff; margin-top:10px; padding:6px 14px}
  .catrow{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line)}
  .catrow:last-child{border-bottom:none}
  .catrow .cl{flex:0 0 96px; font-weight:800; font-size:13.5px}
  .catrow .cp{flex:1; display:flex; flex-wrap:wrap; align-content:center; gap:5px}
  .pip{width:17px; height:17px; border-radius:50%; border:2px solid var(--purple); background:#fff}
  .pip.on{background:var(--purple)}
  .catrow .cn{flex:0 0 auto; font-weight:800; font-size:12.5px; color:var(--mut); white-space:nowrap}

  .rewards{display:flex; flex-direction:column; gap:8px; margin-top:10px}
  .rw{display:flex; align-items:center; gap:11px; background:#faf6ef; border:2px solid var(--line); border-radius:12px; padding:9px 12px}
  .rw .rn{flex:0 0 auto; width:34px; height:34px; border-radius:50%; background:var(--purple); color:#fff; font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center; line-height:1}
  .rw .rd{flex:1; font-weight:700; font-size:14px}
  .rw .rs{flex:0 0 auto; font-size:11.5px; font-weight:800; padding:3px 9px; border-radius:999px}
  .rw.locked{opacity:.5}
  .rw.locked .rn{background:var(--mut)}
  .rw.ok{background:#e7f6ee; border-color:var(--green)}
  .rw.ok .rs{background:var(--green); color:#fff}
  .rw.done{background:#fff; border-style:dashed}
  .rw.done .rd{color:var(--mut); text-decoration:line-through}
  .rw.done .rn{background:var(--mut)}
  .rw.done .rs{background:#eee; color:var(--mut)}
  .rstk{display:inline-block; font-size:10.5px; font-weight:800; color:var(--teal); background:#dcefe6; border-radius:999px; padding:1px 7px; margin-left:6px; vertical-align:middle}
  .rstk.out{color:#fff; background:var(--red)}

  .note{margin-top:16px; font-size:12px; color:var(--mut); font-weight:600; line-height:1.7; background:#fff7e6; border:2px dashed var(--yellow); border-radius:12px; padding:11px 14px}
  .loading{text-align:center; color:var(--mut); font-weight:700; padding:40px 0}
  footer{margin-top:24px; padding-top:16px; border-top:3px dotted var(--line); font-size:11.5px; color:var(--mut); font-weight:600; line-height:1.6}
  footer a{color:var(--cyan); font-weight:800}
  .credit{margin-top:9px; color:#8a847d}
</style>
</head>
<body>

<img class="kvbanner" src="assets/kv-landscape.jpg" alt="片區戶外生活節 2026 · 世界盃系列活動 @ 益隆炮竹廠">

<div class="wrap">
  <nav class="nav"><a href="./">🌦 益隆天氣</a><a href="market.html">🗺 會場地圖</a><a href="activities.html" class="active">🎮 集點卡</a><a href="gallery.html">📸 相片牆</a></nav>
  <header>
    <h1>我的電子集點卡</h1>
    <div class="sub">向工作人員報號碼蓋章 · 集滿去草地旁服務處（A29–A30）換領</div>
    <div class="dots"></div>
  </header>

  <div id="app"><div class="loading">載入緊…</div></div>

  <footer>
    <p><a href="activities.html">← 集點卡 · 活動介紹</a>　|　<a href="./">市集天氣狀態</a></p>
    <p class="credit">主辦：澳門街坊會聯合總會 × 片區發展中心</p>
  </footer>
</div>

<script type="module">
const SB_URL  = "https://pofaxxvjcdugqimummsr.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvZmF4eHZqY2R1Z3FpbXVtbXNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzMzNTQsImV4cCI6MjA5NzMwOTM1NH0.EGgZmbFeNdQSasGjy9tsRnDgVFYYZhQ9xwEnn-xners";
const TABLE   = "cards";
const CATS = [
  {k:"game",     emoji:"🎮", label:"遊戲",     max:4},
  {k:"workshop", emoji:"🛠", label:"工作坊",   max:2},
  {k:"checkin",  emoji:"📸", label:"打卡",     max:1},
  {k:"survey",   emoji:"📋", label:"問卷",     max:1},
  {k:"market",   emoji:"🧾", label:"場內消費", max:3},
  {k:"partner",  emoji:"🏪", label:"合作商戶", max:1},
];
const TOTAL_MAX = CATS.reduce((s,c)=>s+c.max,0);   // 12
const TIERS = [2,4,8,10,11];
const TIER_LABEL = {2:"立減優惠券 1 張",4:"限定小禮物（國家隊毛巾）",8:"限定中禮物（國家隊巾＋搖搖樂掛件）",10:"工作坊體驗 4 選 1",11:"限定大禮物（迷你相機）"};
const LS_KEY = "iec_card_code";
const POLL_MS = 25000;
const CODECHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

const $ = s => document.querySelector(s);
const app = $("#app");
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let sb=null, myCode=null, lastSig=null;
let stockData={};
async function loadStock(){ try{ const c=await getSb(); const {data}=await c.from("reward_stock").select("stock").eq("id",1).maybeSingle(); stockData=(data&&data.stock)||{}; }catch(e){} return stockData; }

function genCode(){ let c="IEC-"; for(let i=0;i<5;i++) c+=CODECHARS[Math.floor(Math.random()*CODECHARS.length)]; return c; }
function total(stamps){ return CATS.reduce((s,c)=>s+(stamps[c.k]||0),0); }

async function getSb(){
  if(sb) return sb;
  const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
  sb = createClient(SB_URL, SB_ANON, {auth:{persistSession:false, autoRefreshToken:false}});  // 強制 anon，唔撞 staff session
  return sb;
}

async function createCard(){
  const c = await getSb();
  for(let attempt=0; attempt<6; attempt++){
    const code = genCode();
    const { data, error } = await c.from(TABLE).insert({ code }).select().single();
    if(!error) return data;
    if(error.code==="23505" || /duplicate|unique/i.test(error.message||"")) continue;  // 撞碼，retry
    throw error;
  }
  throw new Error("code 生成失敗");
}

async function loadCard(){
  const c = await getSb();
  let code = myCode || localStorage.getItem(LS_KEY);
  if(code){
    const { data, error } = await c.from(TABLE).select("*").eq("code", code).maybeSingle();
    if(error) return {error};
    if(data){ myCode=code; return {card:data}; }
    // 有 code 但 row 唔見 → 重開
  }
  const card = await createCard();
  myCode = card.code;
  try{ localStorage.setItem(LS_KEY, card.code); }catch(e){}
  return {card};
}

let _qrCode=null, _qrUrl=null;
async function genQR(code){
  const img = document.getElementById("qrimg"); if(!img) return;
  if(_qrCode===code && _qrUrl){ img.src=_qrUrl; return; }
  try{
    const { default: QRCode } = await import("https://esm.sh/qrcode@1.5.4");
    _qrUrl = await QRCode.toDataURL(location.origin+"/card-staff.html?code="+encodeURIComponent(code), {margin:1, width:380, color:{dark:"#1d1b1a",light:"#ffffff"}});
    _qrCode = code;
    const i2 = document.getElementById("qrimg"); if(i2) i2.src=_qrUrl;
  }catch(e){}
}
function render(card){
  const stamps = card.stamps||{};
  const redeemed = Array.isArray(card.redeemed)?card.redeemed:[];
  const tot = total(stamps);
  const sig = JSON.stringify(stamps)+"|"+redeemed.join(",")+"|"+JSON.stringify(stockData);
  if(sig===lastSig) return;   // 冇變就唔重畫
  lastSig = sig;

  const used = redeemed.length>0;   // 一張卡淨係換一次：有任何核消 = 已用
  if(used){
    let already=false; const jkey="iec_jumped_"+card.code;
    try{ already = !!sessionStorage.getItem(jkey); }catch(e){}
    if(!already){
      try{ sessionStorage.setItem(jkey,"1"); }catch(e){}
      const rwd = TIER_LABEL[redeemed[0]] || "獎賞";
      app.innerHTML =
        '<div class="codecard"><div class="ch">🎉 換領成功</div>'+
        '<div class="cb"><div class="cardcode" style="border-style:solid;border-color:var(--green);color:var(--green);font-size:22px">已換領</div>'+
        '<div style="font-weight:800;font-size:16px;margin:8px 0 2px">'+esc(rwd)+'</div>'+
        '<div class="codehint">多謝參與！即將帶你去填一份簡短問卷…</div></div></div>'+
        '<div class="note">如果冇自動跳：<a href="survey.html" style="color:var(--cyan);font-weight:800">㩒呢度去問卷 →</a></div>';
      setTimeout(()=>{ try{ location.href="survey.html"; }catch(e){} }, 2800);
      return;
    }
  }

  let cats = CATS.map(cat=>{
    const n = Math.min(stamps[cat.k]||0, cat.max);
    let pips=""; for(let i=0;i<cat.max;i++) pips+='<span class="pip'+(i<n?' on':'')+'"></span>';
    return '<div class="catrow"><span class="cl">'+cat.emoji+' '+cat.label+'</span><span class="cp">'+pips+'</span><span class="cn">'+n+'/'+cat.max+'</span></div>';
  }).join('');

  let rewards = TIERS.map(t=>{
    const done = redeemed.includes(t), got = tot>=t;
    const left = stockData[t]; const out = (left!=null && (+left)<=0);
    let cls, status;
    if(done){ cls='done'; status='已換領 ✔︎'; }
    else if(used){ cls='locked'; status='—'; }      // 卡已換領，其餘唔再可換
    else if(out){ cls='locked'; status='換晒'; }
    else if(got){ cls='ok'; status='可換領'; }
    else { cls='locked'; status='未夠'; }
    const lt = (left!=null && !done && !used) ? '<span class="rstk'+(out?' out':'')+'">剩 '+(+left)+'</span>' : '';
    return '<div class="rw '+cls+'"><span class="rn">'+t+'</span><span class="rd">'+esc(TIER_LABEL[t])+lt+'</span><span class="rs">'+status+'</span></div>';
  }).join('');

  app.innerHTML =
    '<div class="codecard"><div class="ch">📇 我的電子卡（畀工作人員掃 QR）</div>'+
    '<div class="cb"><img id="qrimg" class="qr" alt="集點卡 QR" width="190" height="190">'+
    '<div class="cardcode">'+esc(card.code)+'</div>'+
    '<div class="codehint">蓋章 / 換領時，畀工作人員掃呢個 QR（掃唔到就報卡號）。</div></div></div>'+
    '<div class="totalbar"><span class="tn">'+tot+'</span><span class="tt">/ '+TOTAL_MAX+' 個印章</span></div>'+
    '<h2 class="sec2">🏅 印章進度</h2><div class="catcard">'+cats+'</div>'+
    '<h2 class="sec2">🎁 獎賞（每張卡揀一份換）</h2><div class="rewards">'+rewards+'</div>'+
    '<div class="note">⚠️ 電子卡同實體卡並行。<b>只有工作人員可以蓋章 / 核消</b>，你呢度只係查看進度（每 25 秒自動更新）。<br>清除瀏覽器資料 / 換手機 會令呢張電子卡消失，以實體卡為憑。</div>';
  genQR(card.code);
}

async function tick(){
  const r = await loadCard();
  if(r.error){ if(!lastSig) app.innerHTML='<div class="loading">暫時連唔到，遲啲再試 🔄</div>'; return; }
  await loadStock();
  render(r.card);
}

tick();
setInterval(tick, POLL_MS);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) tick(); });
</script>
</body>
</html>
