<!doctype html>
<html lang="zh-Hant-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ec1c24">
<title>攤主介紹 · 片區戶外生活節 2026（益隆）</title>
<meta property="og:title" content="市集攤主介紹 · 世界盃系列（益隆）">
<meta property="og:description" content="片區戶外生活節 2026 — 市集攤主品牌介紹">
<meta property="og:image" content="https://ieclong.com/assets/kv-portrait.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fffdf6; --ink:#1d1b1a; --mut:#76706a; --line:#ece1cd; --card:#fff;
    --red:#ec1c24; --cyan:#00a6e0; --teal:#14a08f; --green:#1fa971;
    --yellow:#ffc20e; --orange:#f5821f; --purple:#7a57a5; --pink:#f49bc3; --magenta:#e6007e;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Baloo 2",-apple-system,BlinkMacSystemFont,"Noto Sans HK","PingFang HK","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    max-width:560px; margin:0 auto; padding:0 0 calc(36px + env(safe-area-inset-bottom)); overflow-x:hidden;
  }
  .wrap{padding:0 15px}
  .nav{display:flex; gap:8px; margin:14px 0 2px}
  .nav a{flex:1; text-align:center; font-family:"Baloo 2",sans-serif; font-weight:800; font-size:13.5px; text-decoration:none; padding:10px 8px; border-radius:999px; border:2.5px solid var(--ink); color:var(--ink); background:#fff}
  .nav a:active{transform:scale(.98)}
  .kvbanner{width:100%; height:auto; display:block}
  .backbar{display:flex; align-items:center; gap:8px; padding:13px 0 2px}
  .back{font:inherit; font-weight:800; font-size:13px; text-decoration:none; color:var(--ink); border:2.5px solid var(--ink); border-radius:999px; padding:7px 14px; background:#fff}
  .back:active{transform:scale(.97)}

  .code{font-weight:800; font-size:13px; color:var(--cyan); letter-spacing:.05em; margin-top:14px}
  .code.bol{color:var(--red)}
  h1.bn{font-size:30px; font-weight:800; margin:3px 0 9px; line-height:1.15; word-break:break-word}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:7px}
  .chip{font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; line-height:1.6}
  .c-mo{background:#fde2e1; color:var(--red)}
  .c-hk{background:#dceefb; color:var(--cyan)}
  .c-jp{background:#fbe6d6; color:var(--orange)}
  .c-tw{background:#e1f3ec; color:var(--teal)}
  .c-uk{background:#e7e9f5; color:#42539e}
  .c-other{background:#eee; color:#666}
  .c-fb{background:#fde9d6; color:var(--orange)}
  .c-exp{background:#e8e0f3; color:var(--purple)}
  .c-bol{background:var(--red); color:#fff}
  .cat{font-size:13.5px; color:var(--mut); font-weight:600; margin:2px 0 16px}

  .gallery{display:flex; gap:10px; overflow-x:auto; padding:2px 0 10px; -webkit-overflow-scrolling:touch; scroll-snap-type:x mandatory}
  .gallery img{height:210px; width:auto; border-radius:14px; border:2.5px solid var(--ink); scroll-snap-align:start; display:block; background:#f3ede1}

  .intro{font-size:15.5px; line-height:1.78; color:var(--ink)}
  .intro p{margin:0 0 13px}
  .tbc{background:#fff7e6; border:2px dashed var(--yellow); border-radius:14px; padding:14px 16px; font-size:14px; color:#8a6d1a; font-weight:600; line-height:1.7}

  .links{display:flex; flex-direction:column; gap:10px; margin:20px 0 8px}
  .lk{display:flex; align-items:center; gap:9px; text-decoration:none; font-weight:800; font-size:15px; padding:14px 18px; border-radius:14px; border:3px solid var(--ink); color:var(--ink); background:#fff}
  .lk:active{transform:scale(.99)}
  .lk .sub{font-weight:600; color:var(--mut); font-size:13px}
  .lk .ar{margin-left:auto; font-size:18px}
  .lk.ig{background:#fff0f6; border-color:var(--magenta); color:var(--magenta)}
  .lk.ig .sub{color:#c0568f}
  .lk.web{background:#eaf6ff; border-color:var(--cyan); color:#0077b6}

  .loc{margin-top:18px; font-size:13.5px; font-weight:700; color:var(--ink)}
  .loc a{color:var(--cyan); font-weight:800}

  footer{margin-top:28px; padding-top:16px; border-top:3px dotted var(--line); font-size:11.5px; color:var(--mut); font-weight:600; line-height:1.6}
  footer a{color:var(--cyan); font-weight:800}
  .credit{margin-top:9px; color:#8a847d}
  .notfound{text-align:center; padding:54px 0; font-weight:700; font-size:16px; line-height:2}
</style>
</head>
<body>

<img class="kvbanner" src="assets/kv-landscape.jpg" alt="片區戶外生活節 2026 · 世界盃系列活動 @ 益隆炮竹廠">

<div class="wrap">
  <nav class="nav"><a href="./">🌦 天氣狀態</a><a href="market.html">🗺 攤主 · 地圖</a></nav>
  <div class="backbar"><a class="back" href="market.html">← 攤主名單</a></div>
  <main id="app"></main>
  <footer>
    <p><a href="market.html">← 返「市集攤主」名單</a></p>
    <p class="credit">主辦：澳門街坊會聯合總會 × 片區發展中心　|　益隆炮竹廠舊址 · 氹仔　|　6/19–7/19 逢五六日 14:00–19:00</p>
  </footer>
</div>

<script src="brands.js"></script>
<script>
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function qs(k){ return new URLSearchParams(location.search).get(k); }

const code=(qs("c")||"").toUpperCase().trim();
const b=(window.BRANDS||[]).find(x=>x.c===code);
const app=document.getElementById("app");

if(!b){
  app.innerHTML='<div class="notfound">搵唔到呢個攤主 🤔<br><a class="back" href="market.html">← 返攤主名單</a></div>';
}else{
  document.title=b.n+" · 片區市集攤主";
  const isBol=b.t&&b.t.includes("bol");
  const om={ "macau":["c-mo","澳門"], "hong-kong":["c-hk","香港"], "japan":["c-jp","日本"], "taiwan":["c-tw","台灣"], "uk":["c-uk","英國"], "other":["c-other","海外"] };
  const chips=[];
  if(b.origin&&om[b.origin]) chips.push('<span class="chip '+om[b.origin][0]+'">'+om[b.origin][1]+'</span>');
  if(isBol) chips.push('<span class="chip c-bol">BOL</span>');
  if(b.t&&b.t.includes("fb")) chips.push('<span class="chip c-fb">餐飲</span>');
  if(b.t&&b.t.includes("exp")) chips.push('<span class="chip c-exp">體驗</span>');

  const gallery=(b.photos&&b.photos.length)
    ? '<div class="gallery">'+b.photos.map(p=>'<img src="'+esc(p)+'" alt="'+esc(b.n)+'" loading="lazy">').join('')+'</div>'
    : '';

  const links=[];
  if(b.igUrl) links.push('<a class="lk ig" href="'+esc(b.igUrl)+'" target="_blank" rel="noopener">📸 Instagram'+(b.ig?' <span class="sub">'+esc(b.ig)+'</span>':'')+'<span class="ar">→</span></a>');
  if(b.site) links.push('<a class="lk web" href="'+esc(b.site)+'" target="_blank" rel="noopener">🌐 官方網站<span class="ar">→</span></a>');

  const body=b.intro
    ? '<div class="intro">'+b.intro.split(/\n+/).map(p=>'<p>'+esc(p)+'</p>').join('')+'</div>'
    : '<div class="tbc">'+(links.length
        ? '呢個攤主嘅詳細介紹整理緊。可以㩒下面連結直接睇佢哋官方頁，了解更多。'
        : '呢個攤主嘅詳細介紹仲整理緊。想了解可以留意大會公布，或者喺市集現場 '+esc(b.c)+' 號攤位睇下。')+'</div>';

  app.innerHTML=
    '<div class="code'+(isBol?' bol':'')+'">攤位 '+esc(b.c)+'</div>'+
    '<h1 class="bn">'+esc(b.n)+'</h1>'+
    (chips.length?'<div class="chips">'+chips.join('')+'</div>':'')+
    (b.cat?'<div class="cat">'+esc(b.cat)+'</div>':'')+
    gallery+
    body+
    (links.length?'<div class="links">'+links.join('')+'</div>':'')+
    '<div class="loc">📍 市集位置 '+esc(b.c)+' · <a href="assets/event-map.jpg" target="_blank" rel="noopener">睇活動地圖</a></div>';
}
</script>
</body>
</html>
