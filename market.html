<!doctype html>
<html lang="zh-Hant-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ec1c24">
<title>會場地圖 · 世界盃系列（益隆）</title>
<meta property="og:title" content="會場地圖 · 世界盃系列（益隆）">
<meta property="og:description" content="片區戶外生活節 2026 — 市集攤主名單 + 活動地圖">
<meta property="og:image" content="https://ieclong.com/assets/event-map.jpg?v=5">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fffdf6; --ink:#1d1b1a; --mut:#76706a; --line:#ece1cd; --card:#fff;
    --red:#ec1c24; --cyan:#00a6e0; --teal:#14a08f; --green:#1fa971;
    --yellow:#ffc20e; --orange:#f5821f; --purple:#7a57a5; --pink:#f49bc3; --magenta:#e6007e;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Baloo 2",-apple-system,BlinkMacSystemFont,"Noto Sans HK","PingFang HK","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    max-width:560px; margin:0 auto; padding:0 0 calc(36px + env(safe-area-inset-bottom)); overflow-x:hidden;
  }
  .lab{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--mut); font-weight:700}
  .wrap{padding:0 15px}
  .nav{display:flex; gap:8px; margin:14px 0 2px}
  .nav a{flex:1; text-align:center; font-family:"Baloo 2",sans-serif; font-weight:800; font-size:12.5px; text-decoration:none; padding:10px 5px; border-radius:999px; border:2.5px solid var(--ink); color:var(--ink); background:#fff; white-space:nowrap}
  .nav a.active{background:var(--ink); color:#fff}
  .nav a:active{transform:scale(.98)}
  .kvbanner{width:100%; height:auto; display:block}
  .backbar{display:flex; align-items:center; gap:8px; padding:14px 0 2px}
  .back{font:inherit; font-weight:800; font-size:13px; text-decoration:none; color:var(--ink); border:2.5px solid var(--ink); border-radius:999px; padding:7px 14px; background:#fff}
  .back:active{transform:scale(.97)}
  header h1{font-size:27px; font-weight:800; margin:12px 0 4px; letter-spacing:.01em}
  header .sub{font-size:12.5px; color:var(--mut); font-weight:600}
  .dots{height:14px; margin:13px 0 2px; background-image:radial-gradient(var(--red) 2px, transparent 2.4px); background-size:11px 11px; opacity:.5}

  .mapcard{margin-top:14px}
  .mapcard a{display:block; border:3px solid var(--ink); border-radius:16px; overflow:hidden; box-shadow:0 6px 0 rgba(0,0,0,.05)}
  .mapcard img{width:100%; height:auto; display:block}
  .maphint{font-size:11.5px; color:var(--mut); font-weight:600; margin:8px 2px 0; text-align:center}

  h2.sec{font-size:21px; font-weight:800; margin:24px 0 4px}
  .tools{position:sticky; top:0; background:var(--bg); padding:9px 0 6px; z-index:5}
  #q{width:100%; font:inherit; font-size:16px; padding:11px 15px; border:2.5px solid var(--ink); border-radius:999px; background:#fff; color:var(--ink)}
  .filters{display:flex; flex-wrap:wrap; gap:7px; margin-top:9px}
  .filters button{font:inherit; font-weight:700; font-size:12.5px; padding:7px 13px; border-radius:999px; border:2.5px solid var(--ink); background:#fff; color:var(--ink); cursor:pointer}
  .filters button.on{color:#fff; background:var(--ink); border-color:var(--ink)}
  .count{font-size:12px; color:var(--mut); font-weight:600; margin:8px 2px 4px}
  .sechint{font-size:12px; color:var(--mut); font-weight:600; margin:4px 2px 0}

  .vlist{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px}
  .v{display:block; text-decoration:none; color:inherit; border:2.5px solid var(--line); border-radius:14px; padding:11px 12px; background:#fff; transition:transform .08s, box-shadow .12s}
  .v:active{transform:scale(.985)}
  .v::after{content:"›"; float:right; color:var(--mut); font-weight:800; font-size:16px; margin-top:-2px}
  .v.bol{border-color:var(--line); background:#fff}
  .v .code{font-family:"Baloo 2"; font-weight:800; font-size:12px; color:var(--cyan)}
  .v.bol .code{color:var(--cyan)}
  .v .nm{font-size:14px; font-weight:700; margin-top:2px; line-height:1.3}
  .v .tg{display:flex; flex-wrap:wrap; gap:4px; margin-top:8px}
  .v .tg span{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; line-height:1.5}
  .t-fb{background:#fde9d6; color:var(--orange)}
  .t-hk{background:#dceefb; color:var(--cyan)}
  .t-exp{background:#e8e0f3; color:var(--purple)}
  .t-bol{background:var(--ink); color:#fff}
  .empty{grid-column:1/-1; text-align:center; color:var(--mut); font-weight:600; padding:26px 0}

  footer{margin-top:26px; padding-top:16px; border-top:3px dotted var(--line); font-size:11.5px; color:var(--mut); font-weight:600; line-height:1.6}
  footer a{color:var(--cyan); font-weight:800}
  .credit{margin-top:10px; color:#8a847d}
  @media(max-width:380px){ .vlist{grid-template-columns:1fr} }
</style>
</head>
<body>

<img class="kvbanner" src="assets/kv-landscape.jpg" alt="片區戶外生活節 2026 · 世界盃系列活動 @ 益隆炮竹廠">

<div class="wrap">
  <nav class="nav"><a href="./">🌦 天氣</a><a href="market.html" class="active">🗺 地圖</a><a href="activities.html">🎮 集點卡</a><a href="gallery.html">📸 相片牆</a><a href="lucky.html">🎁 抽獎</a></nav>
  <header>
    <h1>會場地圖</h1>
    <div class="sub">世界盃系列 · 益隆炮竹廠舊址（氹仔）｜ 30 個攤主</div>
    <div class="dots"></div>
  </header>

  <div class="mapcard">
    <a href="assets/event-map.jpg?v=5" target="_blank" rel="noopener"><img src="assets/event-map.jpg?v=5" alt="活動及市集地圖"></a>
    <div class="maphint">㩒一下睇大圖（攤位 A01–A30 位置）</div>
  </div>

  <h2 class="sec">市集商戶 Market Vendor</h2>
  <div class="sechint">㩒攤主名牌睇品牌介紹 →</div>
  <div class="tools">
    <input id="q" type="search" placeholder="搵攤主… (名 / A01)" autocomplete="off">
    <div class="filters" id="filters">
      <button data-f="all" class="on">全部</button>
      <button data-f="fb">餐飲</button>
      <button data-f="retail">服飾·生活</button>
      <button data-f="exp">體驗</button>
      <button data-f="hk">香港品牌</button>
    </div>
  </div>
  <div class="count" id="count"></div>
  <div class="vlist" id="vlist"></div>

  <footer>
    <p>場地：益隆炮竹廠舊址 · 氹仔　|　6/19–7/19 逢星期五、六、日 14:00–19:00</p>
    <p><a href="./">← 返「市集天氣狀態」</a></p>
    <p class="credit">主辦：澳門街坊會聯合總會 × 片區發展中心</p>
  </footer>
</div>

<script src="brands.js"></script>
<script>
/* 資料來源：Supabase（admin.html 後台改完即時反映）；讀唔到就用 brands.js 靜態版頂住 */
const SB_URL="https://pofaxxvjcdugqimummsr.supabase.co";
const SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvZmF4eHZqY2R1Z3FpbXVtbXNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzMzNTQsImV4cCI6MjA5NzMwOTM1NH0.EGgZmbFeNdQSasGjy9tsRnDgVFYYZhQ9xwEnn-xners";
let V=window.BRANDS||[];

const vlistEl=document.getElementById("vlist"), countEl=document.getElementById("count");
let filter="all", q="";

function esc(s){ return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function matches(v){
  if(filter!=="all" && !v.t.includes(filter)) return false;
  if(q){ if(!((v.c+" "+v.n).toLowerCase().includes(q))) return false; }
  return true;
}
function render(){
  const items=V.filter(matches);
  countEl.textContent = items.length+" 個攤主"+((filter==="all"&&!q)?"":"（篩選後）");
  vlistEl.innerHTML = items.length ? items.map(v=>{
    const bol=v.t.includes("bol"); const ch=[];
    if(bol) ch.push('<span class="t-bol">BOL</span>');
    if(v.t.includes("fb")) ch.push('<span class="t-fb">餐飲</span>');
    if(v.t.includes("hk")) ch.push('<span class="t-hk">香港</span>');
    if(v.t.includes("exp")) ch.push('<span class="t-exp">體驗</span>');
    return '<a class="v'+(bol?' bol':'')+'" href="brand.html?c='+v.c+'"><div class="code">'+v.c+'</div><div class="nm">'+esc(v.n)+'</div>'+(ch.length?'<div class="tg">'+ch.join('')+'</div>':'')+'</a>';
  }).join('') : '<div class="empty">搵唔到，試下第二個關鍵字</div>';
}
document.getElementById("filters").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  filter=b.dataset.f;
  document.querySelectorAll("#filters button").forEach(x=>x.classList.toggle("on",x===b));
  render();
});
document.getElementById("q").addEventListener("input",e=>{ q=e.target.value.trim().toLowerCase(); render(); });
render();
(async()=>{
  try{
    const r=await fetch(SB_URL+"/rest/v1/vendors?select=*&order=code",{headers:{apikey:SB_ANON,Authorization:"Bearer "+SB_ANON}});
    if(!r.ok) return;
    const rows=await r.json();
    if(!Array.isArray(rows)||!rows.length) return;
    V=rows.map(x=>({c:x.code,n:x.n||"",t:x.t||[],cat:x.cat||"",origin:x.origin||"",intro:x.intro||"",ig:x.ig||"",igUrl:x.ig_url||"",site:x.site||"",photos:x.photos||[]}));
    const sub=document.querySelector("header .sub");
    if(sub) sub.textContent="世界盃系列 · 益隆炮竹廠舊址（氹仔）｜ "+V.length+" 個攤主";
    render();
  }catch(e){}
})();
</script>
</body>
</html>
